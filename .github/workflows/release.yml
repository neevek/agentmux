name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            needs_musl: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            needs_musl: true
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.needs_musl
        run: |
          sudo apt-get update
          sudo apt-get -y install musl-tools

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          set -euo pipefail
          target_dir="target/${{ matrix.target }}/release"
          pkg_name="agentmux-${{ matrix.target }}"
          mkdir -p dist
          cp "${target_dir}/agentmux" dist/agentmux
          tar -czf "dist/${pkg_name}.tar.gz" -C dist agentmux
          rm -f dist/agentmux
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "dist/${pkg_name}.tar.gz" > "dist/SHA256SUMS-${{ matrix.target }}.txt"
          else
            sha256sum "dist/${pkg_name}.tar.gz" > "dist/SHA256SUMS-${{ matrix.target }}.txt"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          make_latest: true
